<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Alert Nahariya">
  <title>Alert Nahariya</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── START SCREEN ── */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      padding: 40px;
    }
    #start-screen h1 {
      font-size: clamp(26px, 5vw, 42px);
      font-weight: 300;
      letter-spacing: 4px;
    }
    #start-screen h2 {
      font-size: clamp(20px, 3.5vw, 32px);
      font-weight: 400;
      color: #aaa;
      direction: rtl;
    }
    #start-screen p {
      font-size: clamp(14px, 2vw, 18px);
      color: #666;
      line-height: 1.7;
      max-width: 380px;
    }
    #start-screen p strong { color: #aaa; }
    #start-btn {
      background: #1a1a1a;
      color: #fff;
      border: 2px solid #444;
      padding: 18px 52px;
      font-size: clamp(18px, 2.5vw, 24px);
      border-radius: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }
    #start-btn:active { background: #333; }

    /* ── MAIN APP ── */
    #app {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px 20px;
      transition: background-color 0.4s ease;
    }

    /* ── STATES — all black background ── */
    #app.idle      { background: #000; }
    #app.pre-alert { background: #000; }
    #app.alert     { background: #000; }
    #app.all-clear { background: #000; }

    /* ── TEXT COLORS per state ── */
    #app.pre-alert #alert-title-he,
    #app.pre-alert #alert-title-fr,
    #app.pre-alert #city,
    #app.pre-alert #city-he    { color: #FF9500; }

    #app.alert #alert-title-he,
    #app.alert #alert-title-fr,
    #app.alert #city,
    #app.alert #city-he        { color: #FF2D2D; }

    #app.all-clear #alert-title-he,
    #app.all-clear #alert-title-fr,
    #app.all-clear #city,
    #app.all-clear #city-he    { color: #00CC44; }


    /* ── ALERT CONTENT ── */
    #alert-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    #city {
      font-size: clamp(22px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }
    #city-he {
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 300;
      direction: rtl;
      color: rgba(255,255,255,0.75);
      margin-bottom: 14px;
    }
    #alert-title-he {
      font-size: clamp(44px, 9vw, 80px);
      font-weight: 800;
      direction: rtl;
      line-height: 1.1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    #alert-title-fr {
      font-size: clamp(28px, 5.5vw, 54px);
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    #alert-desc-he {
      font-size: clamp(18px, 3vw, 28px);
      direction: rtl;
      color: rgba(255,255,255,0.88);
      margin-top: 8px;
    }
    #alert-desc-fr {
      font-size: clamp(16px, 2.5vw, 24px);
      color: rgba(255,255,255,0.88);
    }

    /* ── CLOCK ── */
    #clock {
      font-size: clamp(54px, 11vw, 110px);
      font-weight: 100;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      color: rgba(255,255,255,0.95);
    }

    /* Idle clock — visible but discreet */
    .idle #clock {
      font-size: clamp(48px, 10vw, 90px);
      color: #505050;
      letter-spacing: 4px;
    }
    .idle #alert-content { display: none; }
    .idle #countdown     { display: none; }

    /* ── COUNTDOWN (all-clear only) ── */
    #countdown {
      margin-top: 22px;
      font-size: clamp(16px, 2.5vw, 22px);
      color: rgba(255,255,255,0.65);
      letter-spacing: 1px;
    }

    /* ── SHELTER TIMER (all active states) ── */
    #shelter-timer {
      margin-top: 16px;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
      background: rgba(0,0,0,0.2);
      padding: 10px 24px;
      border-radius: 10px;
    }
    .idle #shelter-timer { display: none; }

    /* ── SOURCE LOG ── */
    #source-log {
      margin-top: 10px;
      font-size: clamp(11px, 1.5vw, 14px);
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      font-family: monospace;
    }
    .idle #source-log { display: none; }

    /* ── HISTORY LOG ── */
    #history-log {
      margin-top: 24px;
      font-size: clamp(11px, 1.6vw, 14px);
      color: #444;
      font-family: monospace;
      text-align: left;
      line-height: 1.8;
      max-height: 200px;
      overflow-y: auto;
      width: 100%;
      max-width: 420px;
      padding: 0 12px;
    }
    #history-log div { border-bottom: 1px solid #1a1a1a; padding: 2px 0; }
    #app:not(.idle) #history-log { display: none; }

    /* ── STATUS DOT ── */
    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #333;
      position: fixed;
      bottom: 18px;
      left: 20px;
    }
    #status-dot.ws-ok   { background: #00aa44; }
    #status-dot.ws-lost { background: #cc3300; }

    /* ── API ERROR BANNER ── */
    #api-error {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #7a1a1a;
      color: #fff;
      font-size: 13px;
      text-align: center;
      padding: 8px 12px;
      z-index: 999;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- ── API ERROR BANNER ── -->
  <div id="api-error">⚠ Connexion perdue — vérifiez internet</div>

  <!-- ── START SCREEN ── -->
  <div id="start-screen">
    <h1>ALERT NAHARIYA</h1>
    <h2>נהריה — מערכת התראות</h2>
    <p>
      Appuyez pour démarrer la surveillance.<br>
      Avant de poser l'appareil :<br>
      <strong>Réglages → Affichage → Verrouillage auto → Jamais</strong>
    </p>
    <button id="start-btn">▶ Démarrer</button>

    <div style="margin-top: 30px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
      <button class="test-btn" data-state="pre_alert"                    style="background:#CC7A1A; border:none; color:#fff; padding:12px 20px; border-radius:10px; font-size:15px; cursor:pointer;">Test Pré-alerte</button>
      <button class="test-btn" data-state="alert" data-threat="rocket"   style="background:#B71C1C; border:none; color:#fff; padding:12px 20px; border-radius:10px; font-size:15px; cursor:pointer;">Test Roquette</button>
      <button class="test-btn" data-state="alert" data-threat="drone"    style="background:#B71C1C; border:none; color:#fff; padding:12px 20px; border-radius:10px; font-size:15px; cursor:pointer;">Test Drone</button>
      <button class="test-btn" data-state="alert" data-threat="both"     style="background:#B71C1C; border:none; color:#fff; padding:12px 20px; border-radius:10px; font-size:15px; cursor:pointer;">Test Drone+Roquette</button>
      <button class="test-btn" data-state="all_clear"                    style="background:#1B5E20; border:none; color:#fff; padding:12px 20px; border-radius:10px; font-size:15px; cursor:pointer;">Test Fin d'alerte</button>
    </div>
  </div>

  <!-- ── MAIN APP ── -->
  <div id="app" class="idle">

    <div id="alert-content">
      <div id="city">NAHARIYA</div>
      <div id="city-he">נהריה</div>
      <div id="alert-title-he"></div>
      <div id="alert-title-fr"></div>
      <div id="alert-desc-he"></div>
      <div id="alert-desc-fr"></div>
    </div>

    <div id="clock"></div>
    <div id="countdown"></div>
    <div id="shelter-timer"></div>
    <div id="source-log"></div>
    <div id="history-log"></div>
    <div id="status-dot"></div>

    <button id="back-btn" onclick="document.getElementById('app').style.display='none'; document.getElementById('start-screen').style.display='flex'; stopSiren();" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; border:none; padding:12px 28px; border-radius:10px; font-size:16px; cursor:pointer;">← Retour</button>

  </div>

  <script>
    // =============================================
    // CONFIG
    // =============================================
    const CITY_HE        = 'נהריה';
    const POLL_MS        = 2000;          // poll every 2 sec
    const ALL_CLEAR_MS   = 10 * 1000; // 10 sec green screen
    const SIREN_DURATION = 15;            // seconds

    const ALERT_DEFS = {
      pre_alert: {
        cssClass: 'pre-alert',
        titleHe:  'אזהרה מוקדמת',
        titleFr:  'PRÉ-ALERTE',
        descHe:   'התקרבו למרחב המוגן',
        descFr:   'Rapprochez-vous des abris'
      },
      alert: {
        cssClass: 'alert',
        descHe:   'היכנסו מיד למרחב המוגן',
        descFr:   'Entrez immédiatement dans l\'abri'
      },
      all_clear: {
        cssClass: 'all-clear',
        titleHe:  'ירוק — כל ברור',
        titleFr:  'FIN D\'ALERTE',
        descHe:   'ניתן לצאת מהמרחב המוגן',
        descFr:   'Vous pouvez sortir'
      }
    };

    // Threat-specific titles (used when state === 'alert')
    const THREAT_TEXTS = {
      rocket: { titleHe: 'אזעקה — ירי רקטות וטילים',                    titleFr: 'ALERTE — ROQUETTES / MISSILES' },
      drone:  { titleHe: 'אזעקה — חדירת כלי טיס עוין',                  titleFr: 'ALERTE — DRONE HOSTILE' },
      both:   { titleHe: 'אזעקה — ירי רקטות וטילים + כלי טיס עוין',     titleFr: 'ALERTE — ROQUETTES + DRONE' },
    };

    // =============================================
    // STATE
    // =============================================
    let state          = 'idle'; // idle | pre_alert | alert | all_clear
    let currentThreat  = null;  // 'rocket' | 'drone' | 'both' — only set when state === 'alert'
    let audioCtx       = null;
    let sirenOsc       = null;
    let allClearEndMs  = null;
    let shelterStartMs = null; // when the first alert began

    // =============================================
    // AUDIO — synthesised siren
    // =============================================
    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Unlock with silent buffer
      const buf = audioCtx.createBuffer(1, 1, 22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start();
    }

    function playSiren() {
      if (!audioCtx) return;
      stopSiren();

      const now  = audioCtx.currentTime;
      const dur  = SIREN_DURATION;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filt = audioCtx.createBiquadFilter();

      filt.type = 'lowpass';
      filt.frequency.value = 1800;

      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.38, now + 0.15);
      gain.gain.setValueAtTime(0.38, now + dur - 0.4);
      gain.gain.linearRampToValueAtTime(0, now + dur);

      // Wailing pattern: 3-second cycles, 400 Hz → 900 Hz → 400 Hz
      const cycle = 3.0;
      for (let i = 0; i < Math.ceil(dur / cycle); i++) {
        const t = now + i * cycle;
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(900, t + cycle * 0.5);
        osc.frequency.linearRampToValueAtTime(400, t + cycle);
      }

      osc.connect(filt);
      filt.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur);

      sirenOsc = osc;
    }

    function stopSiren() {
      if (sirenOsc) {
        try { sirenOsc.stop(); } catch (_) {}
        sirenOsc = null;
      }
    }

    // =============================================
    // CLOCK
    // =============================================
    function updateClock() {
      const n = new Date();
      const pad = v => String(v).padStart(2, '0');
      document.getElementById('clock').textContent =
        `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // =============================================
    // TIMERS
    // =============================================
    function updateTimers() {
      // All-clear countdown
      if (state === 'all_clear' && allClearEndMs) {
        const rem = allClearEndMs - Date.now();
        if (rem <= 0) { setState('idle'); return; }
        const m = Math.floor(rem / 60000);
        const s = Math.floor((rem % 60000) / 1000);
        document.getElementById('countdown').textContent =
          `Retour à l'écran noir dans : ${m}:${String(s).padStart(2, '0')}`;
      }

      // Shelter duration timer — shown on all active states
      if (state !== 'idle' && shelterStartMs) {
        const elapsed = Date.now() - shelterStartMs;
        const m = Math.floor(elapsed / 60000);
        const s = Math.floor((elapsed % 60000) / 1000);
        document.getElementById('shelter-timer').textContent =
          `Dans l'abri depuis : ${m} mn ${String(s).padStart(2, '0')} sec`;
      }
    }
    setInterval(updateTimers, 1000);

    // =============================================
    // HISTORY (localStorage)
    // =============================================
    const HISTORY_KEY = 'nahariya-alert-history';
    const MAX_HISTORY = 30;

    function addToHistory(label) {
      try {
        const now = new Date();
        const pad = v => String(v).padStart(2, '0');
        const entry = `${pad(now.getDate())}/${pad(now.getMonth()+1)} ${pad(now.getHours())}:${pad(now.getMinutes())} — ${label}`;
        const hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        hist.unshift(entry);
        if (hist.length > MAX_HISTORY) hist.length = MAX_HISTORY;
        localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
        renderHistory();
      } catch(_) {}
    }

    function renderHistory() {
      try {
        const hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        const el = document.getElementById('history-log');
        if (!hist.length) {
          el.innerHTML = '<div style="color:#333">Aucun événement enregistré</div>';
          return;
        }
        el.innerHTML = hist.map(e => `<div>${e}</div>`).join('');
      } catch(_) {}
    }

    // =============================================
    // STATE MACHINE
    // =============================================
function logSource(source, event) {
      const now = new Date();
      const pad = v => String(v).padStart(2, '0');
      const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById('source-log').textContent = `${time} — ${source} — ${event}`;
    }

    function logRaw(label, obj) {
      const now = new Date();
      const pad = v => String(v).padStart(2, '0');
      const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      const el = document.getElementById('source-log');
      el.textContent = `${time} ${label}: ${JSON.stringify(obj).slice(0, 200)}`;
    }

    // setState(newState, threat)
    // newState : 'idle' | 'pre_alert' | 'alert' | 'all_clear'
    // threat   : 'rocket' | 'drone' | 'both'  (only used when newState === 'alert')
    function setState(newState, threat) {
      // No-op if nothing changed; for alert state, also check threat
      if (state === newState && (newState !== 'alert' || currentThreat === threat)) return;

      state = newState;
      const app = document.getElementById('app');
      app.className = '';

      if (newState === 'idle') {
        app.classList.add('idle');
        stopSiren();
        allClearEndMs  = null;
        shelterStartMs = null;
        currentThreat  = null;
        document.getElementById('countdown').textContent     = '';
        document.getElementById('shelter-timer').textContent = '';
        return;
      }

      const def = ALERT_DEFS[newState];
      app.classList.add(def.cssClass);

      if (newState === 'alert') {
        currentThreat = threat || 'rocket';
        const texts = THREAT_TEXTS[currentThreat];
        document.getElementById('alert-title-he').textContent = texts.titleHe;
        document.getElementById('alert-title-fr').textContent = texts.titleFr;
        const histLabel = { rocket: 'ALERTE — Roquettes/Missiles', drone: 'ALERTE — Drone hostile', both: 'ALERTE — Roquettes + Drone' }[currentThreat];
        addToHistory(histLabel);
      } else {
        document.getElementById('alert-title-he').textContent = def.titleHe;
        document.getElementById('alert-title-fr').textContent = def.titleFr;
        if (newState === 'pre_alert') addToHistory('PRE-ALERTE');
        if (newState === 'all_clear') addToHistory('FIN D\'ALERTE');
      }
      document.getElementById('alert-desc-he').textContent = def.descHe;
      document.getElementById('alert-desc-fr').textContent = def.descFr;

      if (newState === 'all_clear') {
        stopSiren();
        allClearEndMs = Date.now() + ALL_CLEAR_MS;
        // shelterStartMs keeps running — don't reset
      } else {
        if (newState === 'alert') {
          if (!shelterStartMs) shelterStartMs = Date.now();
          playSiren();
        }
        allClearEndMs = null;
        document.getElementById('countdown').textContent = '';
      }
    }

    // Convert classifyApiResponse string → { state, threat }
    function parseAlert(alertType) {
      if (!alertType) return null;
      if (alertType === 'alert_rocket') return { state: 'alert', threat: 'rocket' };
      if (alertType === 'alert_drone')  return { state: 'alert', threat: 'drone' };
      if (alertType === 'alert_both')   return { state: 'alert', threat: 'both' };
      return { state: alertType, threat: null };
    }

    // =============================================
    // ALERT CLASSIFICATION
    // Based on title (reliable) — cat numbers differ between live API and history API
    // "האירוע הסתיים"                    → all_clear
    // "בדקות הקרובות" or "אזהרה מוקדמת" → pre_alert
    // "חדירת כלי טיס עוין"               → alert_drone
    // "ירי רקטות וטילים" or other        → alert_rocket
    // =============================================
    function classifyApiResponse(data) {
      if (!data || data.status === 'none') return null;

      // Support array of alerts (multiple simultaneous threats)
      const alerts = Array.isArray(data.alerts) ? data.alerts : (data.alert ? [data.alert] : []);
      if (!alerts.length) return null;

      // Filter to Nahariya alerts only
      const local = alerts.filter(a => Array.isArray(a.data) && a.data.some(c => c.includes(CITY_HE)));
      if (!local.length) return null;

      // Check titles across all local alerts
      const titles = local.map(a => (a.title || '').trim());
      const allTitles = titles.join(' ');

      if (allTitles.includes('הסתיים') || allTitles.includes('ניתן לצאת')) return 'all_clear';
      if (allTitles.includes('בדקות הקרובות') || allTitles.includes('אזהרה מוקדמת')) return 'pre_alert';

      const hasDrone  = allTitles.includes('כלי טיס') || allTitles.includes('טיס עוין');
      const hasRocket = allTitles.includes('ירי רקטות') || allTitles.includes('טילים') || (!hasDrone);

      if (hasDrone && hasRocket) return 'alert_both';
      if (hasDrone) return 'alert_drone';
      return 'alert_rocket';
    }

    // =============================================
    // POLLING
    // =============================================
    async function poll() {
      // Test mode: ?simulate=pre_alert | alert | all_clear | idle
      const sim = new URLSearchParams(location.search).get('simulate');
      if (sim) {
        if (sim === 'idle')      setState('idle');
        else if (sim === 'alert') setState('alert', 'rocket');
        else if (['pre_alert','all_clear'].includes(sim)) setState(sim);
        return;
      }

      try {
        const res  = await fetch('/api/alerts', { cache: 'no-store' });
        if (!res.ok) {
          document.getElementById('api-error').style.display = 'block';
          document.getElementById('status-dot').className = 'ws-lost';
          return;
        }
        const data = await res.json();

        // Show error banner if both upstream sources failed
        const errBanner = document.getElementById('api-error');
        if (data.apiError) {
          errBanner.textContent = '⚠ API injoignable — alertes peut-être manquées';
          errBanner.style.display = 'block';
          document.getElementById('status-dot').className = 'ws-lost';
        } else {
          errBanner.style.display = 'none';
          document.getElementById('status-dot').className = 'ws-ok';
        }

        const parsed = parseAlert(classifyApiResponse(data));

        if (parsed && parsed.state === 'all_clear') {
          // Only show all-clear if we were already in an active state
          if (['pre_alert','alert'].includes(state)) {
            logSource('Polling', `fin d'alerte (${data.source || '?'})`);
            setState('all_clear');
          }
        } else if (parsed && (parsed.state !== state || (parsed.state === 'alert' && parsed.threat !== currentThreat))) {
          logSource('Polling', `${parsed.state}${parsed.threat ? ':'+parsed.threat : ''} (${data.source || '?'})`);
          setState(parsed.state, parsed.threat);
        }
      } catch (e) {
        console.warn('Poll error:', e.message);
        document.getElementById('api-error').style.display = 'block';
        document.getElementById('status-dot').className = 'ws-lost';
      }
    }

    // =============================================
    // TEST BUTTONS
    // =============================================
    document.querySelectorAll('.test-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        initAudio();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        setState(btn.dataset.state, btn.dataset.threat || null);
        // Show back button
        document.getElementById('back-btn').style.display = 'block';
      });
    });

    // =============================================
    // WAKE LOCK (Android/Chrome only — silent no-op on iOS)
    // =============================================
    let wakeLock = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return; // not supported (iOS Safari)
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        // Re-acquire if released (e.g. tab hidden then visible again)
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState === 'visible' && !wakeLock) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
          }
        });
      } catch (_) {}
    }

    // =============================================
    // WEBSOCKET — tzevaadom real-time feed
    // =============================================
    const THREAT_TITLE_WS = {
      1: 'ירי רקטות וטילים',
      3: 'חדירת כלי טיס עוין',
      6: 'חדירת כלי טיס עוין',
    };

    function connectWebSocket() {
      let ws;
      try {
        ws = new WebSocket('wss://ws.tzevaadom.co.il/socket?platform=WEB');
      } catch(e) { return; }

      ws.onopen = () => {
        console.log('[WS] connected');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          logRaw('WS', msg);

          // Handle array of alerts
          const alerts = Array.isArray(msg) ? msg : (msg.data ? msg.data : null);
          if (!alerts) return;

          // Collect ALL Nahariya alerts (may be drone + rocket simultaneously)
          const nahariyaAlerts = alerts.filter(a => {
            const cities = a.cities || a.towns || [];
            return cities.some(c => c.includes(CITY_HE));
          });

          if (nahariyaAlerts.length > 0) {
            // WS only triggers active alerts — never all-clear
            const fakeData = {
              status: 'active',
              alerts: nahariyaAlerts.map(a => ({
                title: a.title || THREAT_TITLE_WS[a.threat] || 'ירי רקטות וטילים',
                data:  a.cities || a.towns || [],
                cat:   String(a.threat || '1')
              }))
            };
            const parsed = parseAlert(classifyApiResponse(fakeData));
            if (parsed && (parsed.state !== state || (parsed.state === 'alert' && parsed.threat !== currentThreat))) {
              logSource('WebSocket', `${parsed.state}:${parsed.threat || ''}`);
              setState(parsed.state, parsed.threat);
            }
          }
        } catch(e) { console.warn('[WS] parse error:', e); }
      };

      ws.onclose = () => {
        console.log('[WS] closed — reconnecting in 1s');
        setTimeout(connectWebSocket, 1000);
      };

      ws.onerror = () => {
        console.warn('[WS] error');
      };
    }

    // =============================================
    // START
    // =============================================
    document.getElementById('start-btn').addEventListener('click', () => {
      initAudio();
      requestWakeLock();

      document.getElementById('start-screen').style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'flex';

      // Show history immediately
      renderHistory();

      // WebSocket: real-time (primary)
      connectWebSocket();

      // Polling: fallback every 3s
      poll();
      setInterval(poll, POLL_MS);
    });
  </script>
</body>
</html>
